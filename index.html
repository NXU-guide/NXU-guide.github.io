<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1.0, shrink-to-fit=no, viewport-fit=cover">
  <meta name="description" content="宁夏大学生存手册 — 为宁大信息工程学院新生编写">
  <link rel="icon" type="image/png" href="nxu-guide-icon.png?v=2">
  <title>宁夏大学生存手册</title>

  <!-- Docsify Themeable (light + dark) -->
  <link rel="stylesheet" media="(prefers-color-scheme: dark)" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <link rel="stylesheet" media="(prefers-color-scheme: light)" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">

  <!-- Custom Styles -->
  <style>
    /* ===== 基础变量 ===== */
    :root {
      --theme-hue: 220;

      /* 品牌色 */
      --accent-hue: 35;
      --accent-color: hsl(var(--accent-hue), 85%, 48%);

      /* 排版 */
      --base-font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      --mono-font-family: "JetBrains Mono", "Cascadia Code", "SF Mono", "Consolas", monospace;

      --base-font-size: 15px;
      --base-line-height: 1.75;
      --heading-line-height: 1.4;

      /* 间距 */
      --content-max-width: 52em;
      --block-margin: 1.2em;

      /* 链接 */
      --link-color: hsl(220, 65%, 45%);
      --link-color-hover: hsl(220, 70%, 35%);
      --link-text-decoration: none;
      --link-text-decoration-hover: underline;

      /* 过渡 */
      --transition-duration: 0.2s;
    }

    /* ===== 深色模式覆盖 ===== */
    @media (prefers-color-scheme: dark) {
      :root {
        --link-color: hsl(210, 60%, 65%);
        --link-color-hover: hsl(210, 65%, 75%);
      }
    }

    /* ===== 整体布局 ===== */
    body {
      font-family: var(--base-font-family);
      font-size: var(--base-font-size);
      line-height: var(--base-line-height);
    }

    /* ===== 内容区域 ===== */
    .markdown-section {
      max-width: var(--content-max-width);
      margin: 0 auto;
      padding: 2rem 2.5rem;
    }

    /* ===== 标题 ===== */
    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4,
    .markdown-section h5,
    .markdown-section h6 {
      font-weight: 700;
      line-height: var(--heading-line-height);
      margin-top: 1.8em;
      margin-bottom: 0.6em;
      letter-spacing: 0.02em;
    }

    .markdown-section h1 {
      font-size: 2em;
      text-align: center;
      padding-bottom: 0.5em;
      border-bottom: 2px solid hsl(var(--theme-hue), 30%, 85%);
      margin-top: 0;
    }

    .markdown-section h2 {
      font-size: 1.55em;
      padding-bottom: 0.3em;
      border-bottom: 1px solid hsl(var(--theme-hue), 20%, 88%);
    }

    .markdown-section h3 {
      font-size: 1.25em;
    }

    .markdown-section h4 {
      font-size: 1.1em;
      color: hsl(var(--theme-hue), 15%, 40%);
    }

    /* ===== 段落 ===== */
    .markdown-section p {
      margin: var(--block-margin) 0;
      text-align: justify;
    }

    /* ===== 引用块 ===== */
    .markdown-section blockquote {
      border-left: 4px solid var(--accent-color);
      background: hsl(var(--accent-hue), 60%, 96%);
      margin: 1.5em 0;
      padding: 1em 1.2em;
      border-radius: 0 6px 6px 0;
      color: hsl(var(--theme-hue), 20%, 30%);
    }

    .markdown-section blockquote > p {
      margin: 0.3em 0;
      text-align: left;
    }

    .markdown-section blockquote > p:first-child {
      font-size: 1.05em;
      font-weight: 500;
    }

    @media (prefers-color-scheme: dark) {
      .markdown-section blockquote {
        background: hsl(var(--accent-hue), 15%, 12%);
        color: hsl(var(--accent-hue), 30%, 80%);
      }
    }

    /* ===== 列表 ===== */
    .markdown-section ul,
    .markdown-section ol {
      padding-left: 1.8em;
      margin: var(--block-margin) 0;
    }

    .markdown-section li {
      margin: 0.35em 0;
    }

    .markdown-section li > ul,
    .markdown-section li > ol {
      margin: 0.2em 0;
    }

    /* ===== 任务列表 ===== */
    .markdown-section .task-list-item {
      list-style: none;
      margin-left: -1.5em;
    }

    .markdown-section .task-list-item input {
      margin-right: 0.5em;
    }

    /* ===== 代码 ===== */
    .markdown-section code {
      font-family: var(--mono-font-family);
      font-size: 0.88em;
      background: hsl(var(--theme-hue), 20%, 94%);
      padding: 0.15em 0.4em;
      border-radius: 3px;
      color: hsl(350, 60%, 45%);
      word-break: break-word;
    }

    .markdown-section pre {
      margin: 1.2em 0;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .markdown-section pre code {
      background: transparent;
      color: inherit;
      padding: 0;
      font-size: 0.85em;
      line-height: 1.6;
    }

    @media (prefers-color-scheme: dark) {
      .markdown-section code {
        background: hsl(var(--theme-hue), 15%, 18%);
        color: hsl(30, 70%, 65%);
      }
    }

    /* ===== 行内代码（Docsify 主题覆盖） ===== */
    .markdown-section p > code,
    .markdown-section li > code,
    .markdown-section td > code {
      background: hsl(var(--theme-hue), 20%, 94%);
      color: hsl(350, 60%, 45%);
    }

    @media (prefers-color-scheme: dark) {
      .markdown-section p > code,
      .markdown-section li > code,
      .markdown-section td > code {
        background: hsl(var(--theme-hue), 15%, 18%);
        color: hsl(30, 70%, 65%);
      }
    }

    /* ===== 表格 ===== */
    .markdown-section table {
      display: table;
      width: 100%;
      margin: 1.5em 0;
      border-collapse: collapse;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    }

    .markdown-section thead {
      background: hsl(var(--theme-hue), 45%, 35%);
      color: #fff;
    }

    .markdown-section thead th {
      padding: 0.7em 1em;
      font-weight: 600;
      font-size: 0.95em;
      text-align: left;
    }

    .markdown-section tbody td {
      padding: 0.6em 1em;
      border-bottom: 1px solid hsl(var(--theme-hue), 15%, 88%);
    }

    .markdown-section tbody tr:nth-child(even) {
      background: hsl(var(--theme-hue), 15%, 96%);
    }

    .markdown-section tbody tr:hover {
      background: hsl(var(--accent-hue), 60%, 94%);
    }

    @media (prefers-color-scheme: dark) {
      .markdown-section tbody td {
        border-bottom-color: hsl(var(--theme-hue), 15%, 22%);
      }
      .markdown-section tbody tr:nth-child(even) {
        background: hsl(var(--theme-hue), 15%, 10%);
      }
      .markdown-section tbody tr:hover {
        background: hsl(var(--accent-hue), 15%, 14%);
      }
    }

    /* ===== 图片 ===== */
    .markdown-section img {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 1.5em auto;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      transition: transform var(--transition-duration), box-shadow var(--transition-duration);
    }

    .markdown-section img:hover {
      transform: scale(1.01);
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    /* ===== 分隔线 ===== */
    .markdown-section hr {
      border: none;
      height: 1px;
      background: linear-gradient(to right, transparent, hsl(var(--theme-hue), 15%, 78%), transparent);
      margin: 2.5em 0;
    }

    /* ===== 链接 ===== */
    .markdown-section a {
      color: var(--link-color);
      text-decoration: var(--link-text-decoration);
      border-bottom: 1px solid transparent;
      transition: color var(--transition-duration), border-color var(--transition-duration);
    }

    .markdown-section a:hover {
      color: var(--link-color-hover);
      text-decoration: var(--link-text-decoration-hover);
      border-bottom-color: var(--link-color-hover);
    }

    /* ===== 侧边栏 ===== */
    .sidebar {
      background: hsl(var(--theme-hue), 25%, 97%) !important;
      border-right: 1px solid hsl(var(--theme-hue), 15%, 88%) !important;
    }

    .sidebar-nav li {
      margin: 0.15em 0;
    }

    .sidebar-nav a {
      font-size: 0.93em;
      padding: 0.4em 1.2em !important;
      border-radius: 0 6px 6px 0;
      margin-right: 0.8em;
      transition: background var(--transition-duration), color var(--transition-duration);
    }

    .sidebar-nav a:hover {
      background: hsl(var(--theme-hue), 30%, 88%);
    }

    .sidebar-nav .active > a {
      background: hsl(var(--theme-hue), 40%, 28%) !important;
      color: #fff !important;
      font-weight: 600;
    }

    @media (prefers-color-scheme: dark) {
      .sidebar {
        background: hsl(var(--theme-hue), 12%, 10%) !important;
        border-right-color: hsl(var(--theme-hue), 12%, 18%) !important;
      }
      .sidebar-nav a:hover {
        background: hsl(var(--theme-hue), 15%, 18%);
      }
      .sidebar-nav .active > a {
        background: hsl(var(--theme-hue), 45%, 32%) !important;
      }
    }

    /* ===== 侧边栏标题/Logo ===== */
    .app-name-link {
      font-size: 1.2em !important;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    /* ===== 搜索框 ===== */
    .search svg {
      display: none !important;
    }

    .search input {
      border-radius: 8px !important;
      border: 1px solid hsl(var(--theme-hue), 15%, 80%) !important;
      padding: 0.5em 0.8em !important;
      background-image: none !important;
      transition: border-color var(--transition-duration), box-shadow var(--transition-duration);
    }

    .search input:focus {
      border-color: hsl(var(--theme-hue), 50%, 50%) !important;
      box-shadow: 0 0 0 3px hsla(var(--theme-hue), 50%, 50%, 0.15);
      outline: none;
    }

    /* ===== 复制代码按钮 ===== */
    .docsify-copy-code-button {
      border-radius: 0 6px 0 6px !important;
      font-size: 0.78em !important;
      font-family: var(--base-font-family) !important;
    }

    /* ===== 滚动条 ===== */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: hsl(var(--theme-hue), 15%, 78%);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: hsl(var(--theme-hue), 15%, 60%);
    }

    /* ===== 打印样式 ===== */
    @media print {
      .sidebar, .sidebar-toggle, .page-cover, .docsify-copy-code-button {
        display: none !important;
      }
      .markdown-section {
        max-width: 100%;
        padding: 0;
      }
    }

    /* ===== 响应式 ===== */
    @media (max-width: 768px) {
      .markdown-section {
        padding: 1rem 1.2rem;
      }
      .markdown-section h1 {
        font-size: 1.6em;
      }
      .markdown-section h2 {
        font-size: 1.3em;
      }
      .markdown-section table {
        font-size: 0.85em;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: '宁大生存手册',
      repo: 'https://github.com/Megalomanian',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: '搜索手册内容...',
        noData: '没有找到相关内容',
        depth: 4,
      },
      copyCode: {
        buttonText: '复制',
        errorText: '复制失败',
        successText: '已复制',
      },
      pagination: {
        previousText: '上一章',
        nextText: '下一章',
        crossChapter: true,
      },
    };
  </script>

  <!-- Required -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
  <script src="https://unpkg.com/docsify-copy-code@2"></script>

  <!-- Plugins -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/zoom-image.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
</body>
</html>
